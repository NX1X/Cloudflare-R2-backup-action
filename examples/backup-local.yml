name: Backup repo to R2 (local source)

# Example: archive the current repo + a generated changelog and push to R2.
# Runs entirely on the GitHub runner - no remote source needed.

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  backup:
    uses: NX1X/Cloudflare-R2-backup-action/.github/workflows/backup.yml@v1
    with:
      source-mode: local
      backup-script: |
        set -euo pipefail
        echo "Building archive..." >&2
        TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
        ARCHIVE="/tmp/repo_backup_${TIMESTAMP}.tar.gz"
        # Replace this with whatever you actually want to back up.
        tar -czf "$ARCHIVE" \
          --exclude='./node_modules' \
          --exclude='./.git' \
          .
        # Last stdout line = path to archive
        echo "$ARCHIVE"

      bucket:           my-backups
      prefix:           repo-backups/
      retention-days:   '30'
      retention-count:  '50'

      verify-after-upload: true
      verify-mode:         tar

    secrets:
      R2_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
