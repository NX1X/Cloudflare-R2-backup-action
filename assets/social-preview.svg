<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="Segoe UI, Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F17"/>
      <stop offset="100%" stop-color="#161C28"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFA84B"/>
      <stop offset="100%" stop-color="#F38020"/>
    </linearGradient>
    <linearGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#F38020" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F38020" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.2" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#F38020" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F38020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#spot)"/>

  <!-- Subtle dot grid (decorative) -->
  <g fill="#FFFFFF" opacity="0.04">
    <g>
      <circle cx="60"  cy="60"  r="1.5"/><circle cx="120" cy="60"  r="1.5"/><circle cx="180" cy="60"  r="1.5"/><circle cx="240" cy="60"  r="1.5"/>
      <circle cx="60"  cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="180" cy="120" r="1.5"/><circle cx="240" cy="120" r="1.5"/>
      <circle cx="60"  cy="180" r="1.5"/><circle cx="120" cy="180" r="1.5"/><circle cx="180" cy="180" r="1.5"/><circle cx="240" cy="180" r="1.5"/>
    </g>
    <g transform="translate(980,400)">
      <circle cx="0"   cy="0"   r="1.5"/><circle cx="60"  cy="0"   r="1.5"/><circle cx="120" cy="0"   r="1.5"/><circle cx="180" cy="0"   r="1.5"/>
      <circle cx="0"   cy="60"  r="1.5"/><circle cx="60"  cy="60"  r="1.5"/><circle cx="120" cy="60"  r="1.5"/><circle cx="180" cy="60"  r="1.5"/>
      <circle cx="0"   cy="120" r="1.5"/><circle cx="60"  cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="180" cy="120" r="1.5"/>
    </g>
  </g>

  <!-- Cloud icon panel (left side, inside safe area: 160..480 horizontally) -->
  <g transform="translate(200,200)">
    <!-- Halo -->
    <circle cx="120" cy="120" r="170" fill="url(#glow)"/>

    <!-- Cloud body -->
    <g stroke="url(#orange)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- cloud-snow outline (lucide style) scaled 8x from 24px viewbox; centered at 120,120 -->
      <!-- original: M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 16.25 -->
      <path d="M180 158.32 A40 40 0 0 0 160 80 H149.92 A64 64 0 1 0 40 146" stroke="url(#orange)"/>
      <!-- snowflakes -->
      <path d="M64 116 v0.08"/>
      <path d="M64 156 v0.08"/>
      <path d="M104 116 v0.08"/>
      <path d="M104 156 v0.08"/>
      <path d="M144 116 v0.08"/>
      <path d="M144 156 v0.08"/>
    </g>

    <!-- Solid dots for the snow (more readable at small sizes than 0.08 stroke) -->
    <g fill="url(#orange)">
      <circle cx="64"  cy="116" r="7"/>
      <circle cx="64"  cy="156" r="7"/>
      <circle cx="104" cy="116" r="7"/>
      <circle cx="104" cy="156" r="7"/>
      <circle cx="144" cy="116" r="7"/>
      <circle cx="144" cy="156" r="7"/>
    </g>
  </g>

  <!-- Text block (right side, safe area: 500..1120) -->
  <g transform="translate(500,180)">
    <!-- Eyebrow -->
    <text x="0" y="0" font-size="22" font-weight="700" letter-spacing="6" fill="#F38020">GITHUB ACTION</text>

    <!-- Title -->
    <text x="0" y="80" font-size="78" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">Cloudflare R2</text>
    <text x="0" y="158" font-size="78" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">Backup</text>

    <!-- Subtitle -->
    <text x="0" y="218" font-size="26" font-weight="400" fill="#A6B0BF">Upload, verify, list, and prune backups</text>
    <text x="0" y="252" font-size="26" font-weight="400" fill="#A6B0BF">in Cloudflare R2 from GitHub Actions.</text>
  </g>

  <!-- Feature pills row -->
  <g transform="translate(500,490)" font-size="20" font-weight="600">
    <!-- pill 1 -->
    <g>
      <rect x="0" y="0" width="118" height="40" rx="20" fill="#1F2735" stroke="#2C3645" stroke-width="1"/>
      <text x="59" y="26" text-anchor="middle" fill="#E5E7EB">upload</text>
    </g>
    <g transform="translate(132,0)">
      <rect x="0" y="0" width="118" height="40" rx="20" fill="#1F2735" stroke="#2C3645" stroke-width="1"/>
      <text x="59" y="26" text-anchor="middle" fill="#E5E7EB">verify</text>
    </g>
    <g transform="translate(264,0)">
      <rect x="0" y="0" width="118" height="40" rx="20" fill="#1F2735" stroke="#2C3645" stroke-width="1"/>
      <text x="59" y="26" text-anchor="middle" fill="#E5E7EB">list</text>
    </g>
    <g transform="translate(396,0)">
      <rect x="0" y="0" width="118" height="40" rx="20" fill="#1F2735" stroke="#2C3645" stroke-width="1"/>
      <text x="59" y="26" text-anchor="middle" fill="#E5E7EB">prune</text>
    </g>
  </g>

  <!-- Footer tagline -->
  <text x="640" y="600" text-anchor="middle" font-size="18" font-weight="500" fill="#6B7280" letter-spacing="2">
    ZERO TELEMETRY   /   AWS CLI UNDER THE HOOD   /   BY NX1X
  </text>
</svg>
