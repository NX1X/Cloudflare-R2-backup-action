name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal workflow YAML or steps to reproduce the behavior.
      placeholder: |
        1. Used the action with these inputs: ...
        2. Ran the workflow
        3. Got error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error output if any - redact secrets).
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Action Version
      description: "Which version are you using? (e.g. v1, v1.0.0)"
      placeholder: "v1"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - Action only (upload / prune / verify / list)
        - Reusable workflow (backup.yml)
        - Both
    validations:
      required: true

  - type: dropdown
    id: source-mode
    attributes:
      label: Source mode (if reusable workflow)
      options:
        - N/A (action only)
        - local
        - ssh
        - tunnel-ssh
    validations:
      required: false

  - type: dropdown
    id: db-template
    attributes:
      label: DB template (if any)
      options:
        - None (custom backup-script)
        - mysql
        - postgres
        - mongodb
        - sqlite
    validations:
      required: false

  - type: dropdown
    id: runner
    attributes:
      label: Runner OS
      options:
        - ubuntu-latest (Ubuntu 24.04)
        - ubuntu-22.04
        - ubuntu-20.04
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots. Redact any secrets or credentials.
