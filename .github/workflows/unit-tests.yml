name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Shell Logic Tests (mocked AWS CLI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Run unit tests
        run: bash test/run_tests.sh
